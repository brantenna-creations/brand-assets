<!--
================================================================================
DAIMA LUXURY LIMITED :: UNIFIED EMAIL TEMPLATE
================================================================================
Version:        2.0.0
Date:           2026-05-07
Source of Truth: github.com/brantenna-creations/brand-assets/email-template.html
Maintained by:  Brantenna Creations

Changes in 2.0.0:
  Visual depth and mobile fidelity were lacking in 1.0.0. The flat all-white
  rendering on mobile produced a faded appearance because the card border
  was too subtle to register on small screens, and the footer block read
  as continuous with the body. 2.0.0 introduces three structural changes:

  1. Outer wrapper: a full-width off-white background (#F4F2EE) frames the
     card. The white card now sits on a tinted surface, giving it visible
     edge definition on every screen size.

  2. Stronger card border: the card border darkens from #E0DDD8 to #C8C5C0,
     and the top maroon stripe thickens from 2px to 3px. Brand colour
     remains a precision detail rather than a heavy block, but it now
     registers on mobile.

  3. Tinted footer section: contact line, address, links, hairline, and
     copyright sit on a subtle off-white background (#FAF9F6). This
     visually separates the footer from the body without introducing a
     heavy colour block.

  Additional refinements:
  - Visible placeholder text removed. Body cell holds an invisible
    non-breaking space that the user replaces by typing. No selection
    or deletion required.
  - Hairline divider colour darkens from #E0DDD8 to #D4D1CB for visibility.
  - All Western hospitality terminology removed. Footer carries only
    contact data and action links, no labels.

USAGE WORKFLOW:
  Fresh composition: Compose -> Responses -> Daima Email -> click in the
  body area -> type message -> send.
  Reply to external email: Reply -> Responses -> Daima Email -> the
  template inserts at cursor (top), quoted original sits below -> click
  in the body area -> type reply -> send.
  Both flows use a single click on the Responses button. There is no
  automatic-attachment mode in Roundcube; the Insert Response click is
  required per message regardless of composition or reply.

LAYOUT (top to bottom):
  - Outer wrapper: off-white background, full width
  - Card border (1px #C8C5C0)
  - Top maroon stripe (3px)
  - Logo (180px centred)
  - Tagline (Georgia italic charcoal)
  - Hairline divider
  - BODY AREA (invisible placeholder, replaced by user input)
  - Hairline divider
  - Footer section (subtle off-white #FAF9F6 background):
      Contact line (phone, WhatsApp, web)
      Postal address
      Three uppercase action links
      Hairline divider
      Copyright in tiny caps

DESIGN CONSTRAINTS:
  - Tables only (Outlook desktop compatibility)
  - Inline styles only
  - No CSS gradients, no SVG inline, no media queries, no JavaScript
  - All hairlines via nested-table border-top pattern
  - Single column at all viewport widths
================================================================================
-->
