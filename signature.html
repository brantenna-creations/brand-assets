<!--
================================================================================
DAIMA LUXURY LIMITED :: CANONICAL EMAIL SIGNATURE
================================================================================
Version:        7.0.0
Date:           2026-05-07
Source of Truth: github.com/brantenna-creations/brand-assets/signature.html
Maintained by:  Brantenna Creations

Single canonical signature for all clients. Replaces v6.0.0.

Architectural decision in 7.0.0:
  The outer off-white wrapper from v6.0.0 caused the signature to render
  as an isolated card sitting inside the email body rather than a natural
  closing block of the message. The card pushed inward via padding while
  the typed body text spanned the full message width, creating a visible
  width mismatch (the "dancing sideways" effect).

  v7.0.0 removes the outer wrapper entirely. The signature spans the full
  width of the email body container, so its left and right edges align
  precisely with the user's typed body text. No card border, no off-white
  frame. Brand identity is carried by typography, by the maroon top stripe
  spanning the full width, by the hairline dividers, and by the action
  link colour.

  This is the corporate-grade pattern used by premium professional
  services firms (the Times-style centred letterhead block at the
  bottom of a left-aligned letter). The typed message stays
  left-aligned in normal correspondence flow; the signature provides
  centred branded closure.

CROSS-CLIENT BEHAVIOUR:
  Width 100% with no max-width means the signature inherits the email
  body container width, identical to how the body text is rendered. This
  produces consistent alignment in:
    - Roundcube webmail (desktop and mobile browser)
    - Gmail web client
    - Gmail mobile app
    - Outlook desktop (Word HTML renderer)
    - Outlook mobile
    - Apple Mail (iOS, macOS)
    - Any IMAP client with HTML rendering

LAYOUT (top to bottom, all centred within the full-width container):
  - Maroon top stripe (3px, spans full width)
  - Logo (180px)
  - Tagline (Georgia italic charcoal)
  - Hairline divider
  - Contact line (phone, WhatsApp, web)
  - Postal address
  - Action links (Visit Website, Our Services, Reservations)
  - Hairline divider
  - Copyright (tiny uppercase letter-spaced)

DESIGN CONSTRAINTS:
  - No background colours other than white
  - No outer wrapper, no card border
  - Top maroon stripe is the only colour block
  - Hairlines via nested-table border-top pattern (Outlook-safe)
  - All inline styles, table-based layout
  - Single column at all viewport widths
  - Typography: Helvetica Neue stack with Georgia italic for tagline only
================================================================================
-->
