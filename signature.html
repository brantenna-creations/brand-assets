<!--
================================================================================
DAIMA LUXURY LIMITED :: CANONICAL EMAIL SIGNATURE BLOCK
================================================================================
Version:        3.0.0
Date:           2026-05-07
Source of Truth: github.com/brantenna-creations/brand-assets/signature.html
Maintained by:  Brantenna Creations

Changes in 3.0.0 (visual sophistication uplift):
  - Solid maroon banner section replaces the thin stripe header. The maroon
    block creates a real architectural element instead of a document border.
  - Logo housed inside a white "plate" centred on the maroon banner. This is
    the luxury-brand convention used by Cartier, Bulgari, Jaguar, Range Rover
    in print and digital communications.
  - Tagline now appears in white italic on the maroon banner, larger letter
    spacing for editorial feel.
  - Royal blue accent stripe (3px) separates banner from content, providing
    secondary brand colour without overwhelming.
  - "CONCIERGE" pre-header introduced above contact details in maroon
    uppercase letter-spaced 3px, mirroring luxury-hospitality typography.
  - Contact and address typography increased in scale and tracking.
  - Button row enlarged: 13px vertical padding, 24px horizontal, 1px letter
    spacing. Easily tappable on mobile, visually substantial on desktop.
  - Footer strip switched from off-white to deep charcoal (#1A1A1A). This
    bookends the signature in a maroon-charcoal pairing rather than maroon-
    white-white. Closes the design rather than fading it.
  - Maximum width increased to 640px for desktop presence; centred so
    narrow viewports collapse cleanly without media queries.
  - All sections use solid background colours rendered by background-color
    on table cells, which is universally supported including in Outlook
    desktop. No background images. No CSS gradients. No SVG inline. No
    media queries. Complete cross-client fidelity.

This file is the single canonical signature for every mailbox under
daimaluxury.co.ke. It is the corporate brand block only. Sender identity
(name, role, department) is typed into the message body at compose time,
above this signature, never embedded into this file.

Update procedure: edit this file, increment version, commit, then re-paste
into all mailboxes where text or layout changed. Image-only changes require
no re-paste.
================================================================================
-->
